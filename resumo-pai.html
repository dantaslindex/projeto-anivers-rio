<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dantas · Resumo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0b1520;
    --green: #76a713;
    --cream: #f8f5ef;
    --white: #ffffff;
    --gray: #6b7280;
    --border: rgba(11,21,32,0.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '✓';
    position: fixed;
    font-size: 70vw;
    color: rgba(118,167,19,0.04);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
    z-index: 0;
    line-height: 1;
  }

  /* Borda externa / wrapper */
  .outer {
    width: 100%;
    max-width: 580px;
    background: var(--white);
    border-radius: 32px;
    padding: 12px;
    box-shadow: 0 32px 100px rgba(11,21,32,0.12);
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card interno com borda tracejada */
  .card {
    background: var(--cream);
    border-radius: 24px;
    border: 2px dashed rgba(118,167,19,0.25);
    padding: 52px 44px 44px;
    text-align: center;
  }

  .success-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, #76a713, #a8d44a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
    box-shadow: 0 8px 32px rgba(118,167,19,0.3);
    animation: popIn 0.5s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .success-icon svg {
    width: 40px; height: 40px;
    stroke: white; stroke-width: 3;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 34px; font-weight: 700;
    color: var(--dark); margin-bottom: 12px; letter-spacing: -0.5px;
  }
  .card-sub {
    font-size: 15px; color: var(--gray);
    font-weight: 300; line-height: 1.7; margin-bottom: 36px;
  }
  .card-sub strong { color: var(--dark); font-weight: 500; }

  /* Lista de escolhas */
  .escolhas {
    background: var(--white);
    border-radius: 16px;
    padding: 20px 24px;
    text-align: left;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .escolhas-label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gray); font-weight: 500; margin-bottom: 14px;
  }
  .escolhas ul { list-style: none; }
  .escolhas ul li {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; font-size: 15px; color: var(--dark);
    font-weight: 400; border-bottom: 1px solid var(--border);
  }
  .escolhas ul li:last-child { border-bottom: none; padding-bottom: 0; }
  .escolhas ul li:first-child { padding-top: 0; }
  .check {
    width: 24px; height: 24px; background: var(--green);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .check svg {
    width: 13px; height: 13px; stroke: white; stroke-width: 3;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  /* Agradecimento */
  .agradecimento {
    background: linear-gradient(135deg, #f7fced, #edf5d5);
    border: 1.5px solid rgba(118,167,19,0.2);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    margin-top: 8px;
  }
  .agradecimento .ag-icon { font-size: 40px; margin-bottom: 14px; display: block; }
  .agradecimento p {
    font-size: 15px; color: var(--dark);
    line-height: 1.8; font-weight: 300;
  }
  .agradecimento p strong { font-weight: 600; }

  .btn-back {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 32px; font-size: 14px; color: var(--gray);
    text-decoration: none; font-weight: 400; transition: color 0.2s;
  }
  .btn-back:hover { color: var(--dark); }

  @media (max-width: 480px) {
    .outer { padding: 8px; }
    .card { padding: 40px 24px 32px; }
  }

  /* =============================================
     RESPONSIVO MOBILE — adicionado automaticamente
     ============================================= */

  /* Polaroid mais pequeno em mobile */
  @media (max-width: 600px) {
    .hero-polaroid img { width: 160px; height: 200px; }
    .hero-polaroid { padding: 8px 8px 20px; }
  }

  /* Tablet: 2 colunas nos cards */
  @media (max-width: 768px) {
    .options-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-card { padding: 36px 24px; margin: 16px; }
    .header-inner { grid-template-columns: auto 1fr; padding: 0 20px; }
    .header-title { display: none; }
    .info-grid { grid-template-columns: 1fr; gap: 40px; }
    .info-img-wrap { order: -1; max-width: 320px; margin: 0 auto; }
    .section { padding: 64px 20px; }
    .section-inner { padding: 0; }
  }

  /* Mobile: 1 coluna, tudo empilhado */
  @media (max-width: 480px) {
    .hero { padding: 80px 16px 40px; min-height: auto; }
    .hero-content { padding: 0; }
    .options-grid { grid-template-columns: 1fr; gap: 10px; }
    .option-card {
      flex-direction: row;
      align-items: center;
      padding: 16px 20px;
      gap: 16px;
    }
    .option-card .option-icon { font-size: 28px; flex-shrink: 0; }
    .option-card .option-name { font-size: 15px; }
    .option-check { position: static; margin-left: auto; flex-shrink: 0; }
    .section { padding: 56px 16px; }
    .gift-heading { font-size: 28px; }
    .info-title { font-size: 30px; }
    .validation-bar { font-size: 13px; padding: 12px 14px; }
    .btn-confirm { padding: 16px 24px; font-size: 15px; min-height: 52px; }
    .modal-overlay { padding: 16px; align-items: flex-end; }
    .modal-card { border-radius: 20px 20px 16px 16px; padding: 32px 20px 28px; width: 100%; max-width: 100%; }
    .modal-title { font-size: 22px; }
    .modal-btn { padding: 14px; min-height: 48px; }
    /* Login input: evita zoom no iOS */
    input[type="text"], input[type="email"] { font-size: 16px; }
    /* Login cards parentesco em linha */
    .parentesco-options { grid-template-columns: 1fr 1fr 1fr; }
    .parentesco-options label { padding: 12px 4px; font-size: 12px; }
    .parentesco-options label .opt-icon { font-size: 20px; }
    /* Resumo */
    .outer { padding: 6px; }
    .card { padding: 36px 18px 28px; }
    .pix-key { font-size: 13px; letter-spacing: 0; }
    .escolhas { padding: 16px 14px; }
    .card-title { font-size: 26px; }
  }

</style>
</head>
<body>
<div class="outer">
  <div class="card">

    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>

    <h1 class="card-title">Tudo certo!</h1>
    <p class="card-sub" id="card-sub">
      Obrigado por escolher! Abaixo estão os itens selecionados.<br>
      Qualquer um deles vai me deixar muito feliz. 💚
    </p>

    <div class="escolhas">
      <p class="escolhas-label">Você escolheu</p>
      <ul id="lista-escolhas">
        <li><span class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>Nenhuma escolha encontrada.</li>
      </ul>
    </div>

    <div class="agradecimento">
      <span class="ag-icon">🙏</span>
      <p id="msg-agradecimento">
        Muito obrigado por fazer parte desse momento especial.<br>
        Sua presença e seu carinho já são o maior presente. 💚
      </p>
    </div>

    <a class="btn-back" href="javascript:history.back()">← Voltar</a>

  </div>
</div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const itensRaw = params.get('itens');
  const nome     = params.get('nome') || '';

  if (nome) {
    document.getElementById('card-sub').innerHTML =
      `Obrigado, <strong>${nome}</strong>! Abaixo estão os itens selecionados.<br>
       Qualquer um deles vai me deixar muito feliz. 💚`;
    document.getElementById('msg-agradecimento').innerHTML =
      `Muito obrigado, <strong>${nome}</strong>, por fazer parte desse momento especial.<br>
       Sua presença e seu carinho já são o maior presente. 💚`;
  }

  if (itensRaw) {
    // Separador é "|" para não conflitar com vírgulas nos preços
    const itens = itensRaw.split('|').map(i => decodeURIComponent(i.trim())).filter(Boolean);
    const ul = document.getElementById('lista-escolhas');
    ul.innerHTML = itens.map(item => `
      <li>
        <span class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>
        ${item}
      </li>
    `).join('');
  }
</script>
</body>
</html>
